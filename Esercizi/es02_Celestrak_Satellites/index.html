<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CelesTrak Active Objects</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #05070d;
      color: #78b3ff;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
    }

    .hint {
      position: fixed;
      left: 12px;
      bottom: 10px;
      font-size: 12px;
      opacity: 0.8;
      pointer-events: none;
    }

    .stats {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #fd8357;
      /*#ff9800*/
      font-weight: bold;
      font-size: 15px;
      pointer-events: none;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }

    /* Targhetta aggiuntiva sotto il testo a sinistra */
    .details {
      position: fixed;
      top: 30px;
      left: 10px;
      color: #fd8357;
      font-size: 12px;
      pointer-events: none;
      background: rgba(255, 188, 120, 0.1);
      border: 1px solid #fd8357;
      padding: 5px 8px;
      border-radius: 4px;
      margin-top: 5px;
    }

    /* Targhetta dei filtri sotto i dettagli */
    .filters {
      position: fixed;
      top: 75px;
      left: 10px;
      background: rgba(255, 188, 120, 0.1);
      border: 1px solid #fd8357;
      padding: 8px;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 12px;
    }

    .filters label {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 153px;
      color: #fd8357;
    }

    /* Stile per il testo rosso a destra */
    .stats-right {
      position: fixed;
      top: 10px;
      right: 10px;
      color: #78b3ff;
      font-weight: bold;
      font-size: 15px;
      pointer-events: none;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
</head>

<body>
  <div class="stats" id="counter">Loading...</div>
  <div class="details" id="sub-counter">Starlink: 0 | Others: 0</div>

  <div class="filters">
    <label><input type="checkbox" id="filter-all" checked> All</label>
    <label><input type="checkbox" id="filter-starlink" checked> Starlink</label>
    <label><input type="checkbox" id="filter-others" checked> Others</label>
  </div>

  <div class="stats-right">🔵 Earth</div>

  <div class="hint">Drag to rotate | wheel to zoom</div>

  <script>
    const DATA_URL = "https://corsproxy.io/?https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=json";
    const MU_EARTH = 398600.4418;
    const EARTH_RADIUS_KM = 6378.137;
    const EARTH_RADIUS_PX = 50;

    let satPoints = [];
    let loading = true;
    let errorMessage = "";
    let earthTexture;
    let starlinkCount = 0;

    function preload() {
      earthTexture = loadImage('Materiale/TextureTerra10k_BN.jpg');
    }

    function degToRad(v) {
      return v * Math.PI / 180;
    }

    function solveKepler(meanAnomalyRad, eccentricity) {
      let E = meanAnomalyRad;
      for (let i = 0; i < 6; i += 1) {
        const f = E - eccentricity * Math.sin(E) - meanAnomalyRad;
        const fp = 1 - eccentricity * Math.cos(E);
        E = E - f / fp;
      }
      return E;
    }

    function elementToEciKm(sat) {
      const inc = degToRad(Number(sat.INCLINATION));
      const raan = degToRad(Number(sat.RA_OF_ASC_NODE));
      const argp = degToRad(Number(sat.ARG_OF_PERICENTER));
      const meanAnomaly = degToRad(Number(sat.MEAN_ANOMALY));
      const e = Number(sat.ECCENTRICITY);
      const meanMotionRevPerDay = Number(sat.MEAN_MOTION);

      if (!Number.isFinite(inc) || meanMotionRevPerDay <= 0) return null;

      const n = meanMotionRevPerDay * 2 * Math.PI / 86400;
      const a = Math.cbrt(MU_EARTH / (n * n));
      const E = solveKepler(meanAnomaly, e);
      const nu = 2 * Math.atan2(Math.sqrt(1 + e) * Math.sin(E / 2), Math.sqrt(1 - e) * Math.cos(E / 2));
      const r = a * (1 - e * Math.cos(E));
      const u = argp + nu;

      const cosO = Math.cos(raan),
        sinO = Math.sin(raan);
      const cosI = Math.cos(inc),
        sinI = Math.sin(inc);
      const cosU = Math.cos(u),
        sinU = Math.sin(u);

      return {
        x: r * (cosO * cosU - sinO * sinU * cosI),
        y: r * (sinO * cosU + cosO * sinU * cosI),
        z: r * (sinU * sinI),
        meanMotionRevPerDay
      };
    }

    async function fetchElements() {
      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) throw new Error("HTTP " + response.status);
        const json = await response.json();
        const raw = Array.isArray(json) ? json : [];
        const total = raw.length;

        for (let i = 0; i < total; i++) {
          const rawSat = raw[i];
          const p = elementToEciKm(rawSat);
          if (p) {
            const isStarlink = rawSat.OBJECT_NAME && rawSat.OBJECT_NAME.includes("STARLINK");
            if (isStarlink) {
              starlinkCount++;
            }

            const t = constrain(map(p.meanMotionRevPerDay, 1, 16, 0, 1), 0, 1);
            satPoints.push({
              x: p.x * (EARTH_RADIUS_PX / EARTH_RADIUS_KM),
              y: p.y * (EARTH_RADIUS_PX / EARTH_RADIUS_KM),
              z: p.z * (EARTH_RADIUS_PX / EARTH_RADIUS_KM),
              r: lerp(90, 255, t),
              g: lerp(180, 130, t),
              b: lerp(255, 90, t),
              isStarlink: isStarlink
            });
          }

          if (i % 50 === 0 || i === total - 1) {
            document.getElementById('counter').innerText = `${satPoints.length} / ${total} Satellites`;
            document.getElementById('sub-counter').innerText =
              `Starlink: ${starlinkCount} | Others: ${satPoints.length - starlinkCount}`;
          }

          if (i % 200 === 0) await new Promise(r => setTimeout(r, 0));
        }

      } catch (err) {
        errorMessage = "Error: " + err.message;
        document.getElementById('counter').innerText = "Errore Dati";
      } finally {
        loading = false;
      }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight, WEBGL);
      pixelDensity(1);
      perspective(PI / 3, width / height, 1, 5000);
      camera(0, -100, 500, 0, 0, 0, 0, 1, 0);

      // Gestione checkbox "Tutti"
      document.getElementById('filter-all').addEventListener('change', (e) => {
        const isChecked = e.target.checked;
        document.getElementById('filter-starlink').checked = isChecked;
        document.getElementById('filter-others').checked = isChecked;
      });

      fetchElements();
    }

    function drawEarth() {
      push();
      if (earthTexture) {
        texture(earthTexture);
      } else {
        fill(25, 55, 140);
      }
      noStroke();
      sphere(EARTH_RADIUS_PX, 32, 24);
      pop();
    }

    function drawSatPoints() {
      const showStarlink = document.getElementById('filter-starlink').checked;
      const showOthers = document.getElementById('filter-others').checked;

      strokeWeight(3);
      noFill();
      beginShape(POINTS);
      for (const p of satPoints) {
        if ((p.isStarlink && showStarlink) || (!p.isStarlink && showOthers)) {
          stroke(p.r, p.g, p.b, 215);
          vertex(p.x, -p.z, p.y);
        }
      }
      endShape();
    }

    function draw() {
      background(5, 7, 13);
      orbitControl(1.0, 1.0, 1.0);
      ambientLight(150);
      directionalLight(255, 255, 255, 0.5, 0.5, -1);
      rotateY(frameCount * 0.0005);

      if (!errorMessage) {
        drawSatPoints();
      }

      drawEarth();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>

</html>
